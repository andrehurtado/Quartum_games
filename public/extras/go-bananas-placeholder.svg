<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171B22"/>
      <stop offset="1" stop-color="#242B36"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(340 240) rotate(36) scale(520 320)">
      <stop stop-color="#F59E0B" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 560) rotate(18) scale(420 280)">
      <stop stop-color="#34D399" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="280" y="250" width="640" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <linearGradient id="card" x1="360" y1="190" x2="880" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A3340"/>
      <stop offset="1" stop-color="#1F2732"/>
    </linearGradient>
    <linearGradient id="accent" x1="390" y1="255" x2="810" y2="515" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#EA580C" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow1)"/>
  <rect width="1200" height="800" fill="url(#glow2)"/>

  <g filter="url(#shadow)">
    <ellipse cx="600" cy="610" rx="230" ry="28" fill="#000" fill-opacity="0.55"/>
  </g>

  <rect x="340" y="170" width="520" height="360" rx="28" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <rect x="385" y="230" width="430" height="230" rx="20" fill="url(#accent)" fill-opacity="0.9"/>
  <rect x="405" y="252" width="390" height="188" rx="14" fill="#111827" fill-opacity="0.34" stroke="#FFFFFF" stroke-opacity="0.2"/>

  <circle cx="486" cy="346" r="40" fill="#FBBF24" fill-opacity="0.85"/>
  <circle cx="600" cy="346" r="40" fill="#F59E0B" fill-opacity="0.85"/>
  <circle cx="714" cy="346" r="40" fill="#EA580C" fill-opacity="0.85"/>

  <path d="M470 520C515 466 574 438 632 438C689 438 742 463 780 504" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="6" stroke-linecap="round"/>
  <path d="M444 548C507 475 591 440 676 446C744 451 804 481 844 526" stroke="#F59E0B" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round"/>

  <text x="600" y="640" text-anchor="middle" fill="#E5E7EB" font-family="Outfit, sans-serif" font-size="42" font-weight="600" letter-spacing="0.5">
    Go Bananas
  </text>
  <text x="600" y="682" text-anchor="middle" fill="#9CA3AF" font-family="DM Sans, sans-serif" font-size="22">
    Coming Soon
  </text>
</svg>
